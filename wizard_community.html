<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ClawProfile</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-top: #4a342b;
      --bg-bottom: #1f1410;
      --gold-light: #f7e6a1;
      --gold-dark: #c59b4c;
      --text-gray: #a89d91;
      --paper-color: #f6eedb;
      --paper-shadow: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Serif SC", serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    /* Container to limit max width for pure mobile look on desktop */
    .app-container {
      width: 100%;
      max-width: 430px;
      /* Max mobile width */
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #372118 0%, #170d0a 100%);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* Wood Texture Overlay for Header */
    .app-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      /* Subtle wood grain texture trick using gradients */
      background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 0, 0, 0.05) 1px, rgba(0, 0, 0, 0.05) 2px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    /* Nav Header */
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px 10px 20px;
      z-index: 10;
      position: relative;
    }

    /* Back Arrow */
    .back-btn {
      width: 30px;
      height: 24px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .back-btn svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0px 0px 4px rgba(255, 215, 0, 0.4));
    }

    /* Title */
    .title-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title-wrapper::before,
    .title-wrapper::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(200, 180, 150, 0.5) 50%, transparent 100%);
    }

    .title-wrapper::before {
      top: -2px;
    }

    .title-wrapper::after {
      bottom: -2px;
    }

    .nav-title {
      color: #e2d1bc;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 2px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      font-family: inherit;
    }

    /* Right Tools */
    .header-tools {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 4px 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      gap: 8px;
    }

    .dot-menu,
    .target-menu {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dot-menu {
      width: 16px;
      height: 16px;
      position: relative;
    }

    .dot-menu::before,
    .dot-menu::after {
      content: '';
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
    }

    .dot-menu::before {
      left: 4px;
    }

    .dot-menu::after {
      right: 4px;
    }

    .target-menu {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      position: relative;
    }

    .target-menu::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Search Bar */
    .search-wrapper {
      padding: 5px 20px 15px 20px;
      z-index: 10;
      position: relative;
    }

    .search-bar {
      background: rgba(10, 5, 2, 0.6);
      border-radius: 16px;
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .search-icon {
      width: 14px;
      height: 14px;
      border: 1.5px solid #a89d91;
      border-radius: 50%;
      position: relative;
    }

    .search-icon::after {
      content: '';
      position: absolute;
      width: 1.5px;
      height: 6px;
      background: #a89d91;
      right: -3px;
      bottom: -4px;
      transform: rotate(-45deg);
    }

    .search-input {
      background: transparent;
      border: none;
      color: #e2d1bc;
      font-size: 13px;
      margin-left: 10px;
      width: 100%;
      outline: none;
      letter-spacing: 0.5px;
    }

    .search-input::placeholder {
      color: var(--text-gray);
    }

    /* Main Paper Area */
    .main-content {
      flex: 1;
      position: relative;
      margin: 2px 14px 0px 14px;
      /* Proper mobile horizontal inset */
      display: flex;
      justify-content: center;
      z-index: 5;
    }

    /* Stacked Paper base */
    .paper-stack {
      position: absolute;
      top: 0;
      bottom: 60px;
      /* Tucked deep into the leather pad */
      width: 100%;
      max-width: 420px;
    }

    /* Paper Sheets */
    .sheet {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      border-radius: 1px 1px 0 0;
      /* Subtle white top edge simulating paper thickness */
      border-top: 1px solid rgba(255, 255, 255, 0.8);
    }

    .sheet-3 {
      top: 8px;
      left: -5px;
      right: -1px;
      background: #d8cba9;
      box-shadow: -2px -1px 8px rgba(0, 0, 0, 0.5);
      z-index: 1;
      transform: rotate(-0.6deg);
    }

    .sheet-2 {
      top: 4px;
      left: -1px;
      right: 3px;
      background: #e6dac1;
      box-shadow: -1px -1px 5px rgba(0, 0, 0, 0.4);
      z-index: 2;
      transform: rotate(0.4deg);
    }

    .sheet-front {
      top: 0;
      left: 0px;
      right: 0px;
      background: #fdf8eb;
      /* Perfect parchment base cream */
      z-index: 3;
      /* Drop shadow on other sheets */
      box-shadow:
        -3px -1px 6px rgba(0, 0, 0, 0.25),
        2px 0px 5px rgba(0, 0, 0, 0.15),
        inset 0 0 50px rgba(180, 140, 100, 0.08);
      /* Vignette */

      /* Divine Lighting & Noise */
      background-image:
        linear-gradient(135deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.6) 15%, transparent 45%),
        radial-gradient(circle at center, rgba(246, 238, 219, 0.8) 0%, rgba(230, 215, 190, 0.4) 100%),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" stitchTiles="stitch"/></filter><rect width="200" height="200" filter="url(%23noise)" opacity="0.04"/></svg>');
    }

    /* Paper side edge depth/shadows */
    .sheet-front::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 10px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.08) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    .sheet-front::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 6px;
      background: linear-gradient(270deg, rgba(0, 0, 0, 0.05) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Watermark Crest */
    .crest-container {
      position: absolute;
      top: 160px;
      width: 150px;
      height: 120px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.12;
      filter: drop-shadow(0 1px 1px rgba(255, 255, 255, 0.6));
      pointer-events: none;
    }

    .crest-svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #7f7362;
      stroke-width: 1.5;
    }

    /* Bottom Navigation Bar (Leather Pad overlay) */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 75px;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    /* The Leather Flaps creating the slanted V-edge holding the paper */
    .leather-flap {
      position: absolute;
      width: 55%;
      height: 120px;
      /* Taller to ensure it completely covers the bottom */
      bottom: -20px;
      background: linear-gradient(180deg, #322118 0%, #0a0503 100%);
      border-top: 1.5px solid rgba(180, 140, 100, 0.4);
      /* Subtle stitched edge highlight */
      box-shadow: 0 -8px 25px rgba(0, 0, 0, 0.85);
      /* Heavy shadow casting UP onto the parchment */
      z-index: -1;
    }

    .flap-left {
      left: -5%;
      transform: rotate(4deg);
      transform-origin: bottom left;
    }

    .flap-right {
      right: -5%;
      transform: rotate(-4deg);
      transform-origin: bottom right;
    }

    .nav-item {
      flex: 1;
      text-align: center;
      color: #9c9085;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      position: relative;
      padding-bottom: 4px;
      cursor: pointer;
      z-index: 10;
    }

    .nav-item.active {
      color: #f3e5c8;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(243, 229, 200, 0.4);
    }

    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: rgba(220, 200, 150, 0.95);
      box-shadow: 0 0 10px rgba(220, 200, 150, 0.8);
      border-radius: 2px;
    }

    .nav-center-wrapper {
      position: relative;
      width: 80px;
      height: 100%;
      display: flex;
      justify-content: center;
      z-index: 60;
    }

    .nav-center-btn {
      position: absolute;
      top: -25px;
      /* Protrudes upwards out of the slanted cradle */
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #2e2017 40%, #110805 100%);
      box-shadow:
        0 -4px 15px rgba(0, 0, 0, 0.9),
        inset 0 0 8px rgba(255, 255, 255, 0.05),
        0 0 25px rgba(200, 180, 140, 0.15);
      /* Ambient glow */
      border: 3px solid #6b583f;
      border-top-color: #a49174;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Inner decorative dashed ring */
    .nav-center-btn::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px dashed rgba(200, 180, 140, 0.25);
    }

    .nav-center-btn.active-center {
      box-shadow:
        0 -4px 15px rgba(0, 0, 0, 0.9),
        inset 0 0 8px rgba(255, 255, 255, 0.05),
        0 0 30px rgba(220, 200, 150, 0.4);
      border-color: #c8b48c;
    }

    /* Paper airplane icon */
    .icon-airplane {
      width: 38px;
      height: 38px;
      position: relative;
      z-index: 2;
    }

    .icon-airplane svg {
      width: 100%;
      height: 100%;
      transform: rotate(-45deg) scale(0.9);
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 1));
    }

    /* Sub Tabs */
    .sub-tabs {
      display: flex;
      padding: 0 25px 15px 35px;
      gap: 50px;
      z-index: 10;
      position: relative;
      align-items: center;
    }

    .tab-btn {
      color: #e2d1bc;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      letter-spacing: 2px;
    }

    .tab-btn.active {
      color: #3b2818;
      font-weight: 800;
    }

    .tab-bg-shadow {
      position: absolute;
      top: -10px;
      bottom: -10px;
      left: -25px;
      right: -25px;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.6));
      z-index: -1;
    }

    .tab-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fef8eb 0%, #ecd1a8 100%);
      clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
      position: relative;
    }

    .tab-bg::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 4px;
      right: 4px;
      bottom: 3px;
      border: 1px dashed #bda376;
      clip-path: polygon(9% 0, 91% 0, 100% 50%, 91% 100%, 9% 100%, 0 50%);
    }

    /* Paper Inner Content */
    .paper-inner-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 25px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Markdown Text Styles */
    .markdown-body {
      color: #3e2723; /* Deep dark brown for text */
      font-family: "Georgia", serif;
      line-height: 1.6;
      font-size: 15px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Custom scrollbar for parchment — hidden until scrolling */
    .markdown-body::-webkit-scrollbar {
      width: 4px;
    }
    .markdown-body::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .markdown-body.scrolling::-webkit-scrollbar-thumb {
      background: rgba(139, 69, 19, 0.3);
    }

    .markdown-body h1 {
      font-size: 20px;
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 2px dashed rgba(139, 69, 19, 0.25);
      padding-bottom: 5px;
      color: #2b1c11;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 1px rgba(255,255,255,0.8);
    }
    
    .markdown-body p {
      margin-bottom: 12px;
    }
    
    .markdown-body strong {
      font-weight: 700;
      color: #2b1c11;
    }
    
    .markdown-body em {
      font-style: italic;
      color: #6d4c41;
      font-family: serif;
    }
    
    .markdown-body ul {
      padding-left: 20px;
      margin-bottom: 15px;
      list-style-type: none; /* Custom magic markers */
    }
    
    .markdown-body li {
      margin-bottom: 8px;
      position: relative;
    }
    .markdown-body li::before {
      content: '✦';
      position: absolute;
      left: -18px;
      color: #8c7355;
      font-size: 12px;
      line-height: inherit;
    }
    
    .markdown-body hr {
      border: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 69, 19, 0.3), transparent);
      margin: 20px 0;
    }
    
    .markdown-body code {
      font-family: inherit;
      background: rgba(139, 69, 19, 0.08); /* Faded parchment code block */
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 14px;
      border: 1px solid rgba(139, 69, 19, 0.15);
      color: #8c2a1a;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    
    /* Edit Mode Styles */
    .markdown-editor {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      color: #3e2723;
      line-height: 1.6;
      display: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 30px;
    }
    .markdown-editor::-webkit-scrollbar { width: 4px; }
    .markdown-editor::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
    .markdown-editor.scrolling::-webkit-scrollbar-thumb { background: rgba(139, 69, 19, 0.3); }
    
    .header-edit-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #dfcd97;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
      z-index: 20;
    }
    .header-edit-btn:active {
      transform: translateY(-50%) scale(0.95);
      background: rgba(0,0,0,0.4);
    }
    
    /* Candles */
    .candles-container {
      position: absolute;
      right: 0px;
      bottom: 80px;
      /* Just above the nav bar */
      z-index: 30;
      pointer-events: none;
    }

    .candle {
      position: absolute;
      bottom: 0;
      width: 16px;
      height: 60px;
      background: linear-gradient(90deg, #d3c7ad 0%, #a4967a 40%, #e9e1c4 80%, #a4967a 100%);
      border-radius: 4px 4px 1px 1px;
      box-shadow: inset 0 -10px 15px rgba(60, 40, 30, 0.9);
      transform-origin: bottom center;
    }

    .candle::after {
      /* Melted wax drip */
      content: '';
      position: absolute;
      top: 4px;
      left: -2px;
      width: 6px;
      height: 18px;
      background: #e9e1c4;
      border-radius: 3px;
      box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    }

    .candle-flame {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 18px;
      background: white;
      border-radius: 50% 50% 20% 20%;
      box-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600, 0 0 35px #ff0000;
      animation: flicker 0.15s infinite alternate;
      border-bottom: 2px solid rgba(80, 40, 10, 0.8);
    }

    @keyframes flicker {
      0% {
        transform: translateX(-50%) scale(1) skewX(-2deg);
        opacity: 0.85;
      }

      100% {
        transform: translateX(-50%) scale(1.05) skewX(2deg);
        opacity: 1;
      }
    }

    .candle1 {
      right: 8px;
      transform: rotate(4deg);
      height: 75px;
      z-index: 2;
    }

    .candle2 {
      right: -4px;
      transform: rotate(12deg);
      bottom: -10px;
      height: 50px;
      z-index: 1;
    }

    /* Tweaking paper-stack bottom to dip under the new taller nav bar */
    .paper-stack {
      bottom: 75px;
    }

    /* File picker overlay */
    .file-picker-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 5, 2, 0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .file-picker-overlay.show {
      display: flex;
    }
    .file-picker-panel {
      background: linear-gradient(135deg, #fef8eb 0%, #ecd1a8 100%);
      border-radius: 12px;
      padding: 24px 20px;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      border: 1px solid rgba(180,140,100,0.5);
    }
    .file-picker-title {
      color: #2b1c11;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 1px;
    }
    .file-picker-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(59, 40, 24, 0.08);
      border: 1.5px dashed rgba(139, 69, 19, 0.3);
      border-radius: 8px;
      color: #3e2723;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .file-picker-btn:last-child { margin-bottom: 0; }
    .file-picker-btn:active {
      background: rgba(59, 40, 24, 0.18);
      transform: scale(0.97);
    }
    .file-picker-cancel {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: transparent;
      border: none;
      color: #8c7355;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
    }

    /* Skills List */
    .skills-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .skill-card {
      background: rgba(59, 40, 24, 0.06);
      border: 1.5px solid rgba(139, 69, 19, 0.2);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .skill-card:active {
      background: rgba(59, 40, 24, 0.14);
      transform: scale(0.98);
    }
    .skill-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .skill-card-name {
      font-size: 15px;
      font-weight: 700;
      color: #2b1c11;
    }
    .skill-card-category {
      font-size: 11px;
      color: #8c7355;
      background: rgba(139, 69, 19, 0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .skill-card-tagline {
      font-size: 13px;
      color: #6d4c41;
      line-height: 1.4;
    }
    .skill-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #8c7355;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 12px;
      padding: 4px 0;
    }
    .skill-back-btn:active { opacity: 0.6; }
  </style>
</head>

<body>

  <div class="app-container">

    <!-- Nav Header -->
    <div class="nav-header" style="justify-content: center;">
      <div class="title-wrapper">
        <div class="nav-title">巫师社区</div>
      </div>
      <div class="header-edit-btn" id="toggle-edit-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        编辑
      </div>
    </div>



    <!-- Main Content Area -->
    <div class="main-content">
      <div class="paper-stack">
        <!-- Backmost sheet -->
        <div class="sheet sheet-3"></div>
        <!-- Middle sheet -->
        <div class="sheet sheet-2"></div>
        <!-- Front sheet -->
        <div class="sheet sheet-front">

          <div class="paper-inner-content">
            <div id="md-display" class="markdown-body"></div>
            <textarea id="md-editor" class="markdown-editor" spellcheck="false"></textarea>
          </div>

          <!-- File Picker Overlay -->
          <div class="file-picker-overlay" id="file-picker">
            <div class="file-picker-panel">
              <div class="file-picker-title">选择要编辑的档案</div>
              <div id="file-picker-list"></div>
              <button class="file-picker-cancel" id="file-picker-cancel">取消</button>
            </div>
          </div>

          <!-- Watermark Crest -->
          <div class="crest-container">
            <svg class="crest-svg" viewBox="0 0 100 100">
              <!-- Left Wing / Feathers -->
              <path d="M45,60 C30,70 15,45 25,30 C30,22 40,25 45,35" stroke-dasharray="2,2" />
              <path d="M48,58 C35,68 20,50 28,38 C32,32 40,35 44,42" />
              <!-- Right Wing / Feathers -->
              <path d="M55,60 C70,70 85,45 75,30 C70,22 60,25 55,35" stroke-dasharray="2,2" />
              <path d="M52,58 C65,68 80,50 72,38 C68,32 60,35 56,42" />
              <!-- Center Ribbon -->
              <path d="M20,65 Q50,45 80,65" fill="#f6eedb" />
              <path d="M20,65 Q50,45 80,65" stroke-width="2" />
              <path d="M20,70 Q50,50 80,70" stroke-width="2" />
              <path d="M20,65 L20,70 M80,65 L80,70" stroke-width="2" />
              <path d="M20,65 L10,60 L15,75 Z" fill="#f6eedb" stroke-width="1.5" />
              <path d="M80,65 L90,60 L85,75 Z" fill="#f6eedb" stroke-width="1.5" />
              <!-- Crossed Wands / Swords -->
              <line x1="35" y1="80" x2="65" y2="40" stroke-width="1" />
              <line x1="65" y1="80" x2="35" y2="40" stroke-width="1" />
              <!-- Stars -->
              <circle cx="50" cy="20" r="1.5" fill="#7f7362" stroke="none" />
              <circle cx="20" cy="40" r="1" fill="#7f7362" stroke="none" />
              <circle cx="80" cy="40" r="1" fill="#7f7362" stroke="none" />
            </svg>
          </div>

        </div>
      </div>

      <!-- Candles -->
      <div class="candles-container">
        <div class="candle candle1">
          <div class="candle-flame"></div>
        </div>
        <div class="candle candle2">
          <div class="candle-flame"></div>
        </div>
      </div>

      <!-- Bottom Navigation Bar -->
      <div class="bottom-nav">
        <!-- Slanted Leather Pad Flaps representing the desk pad holding the paper -->
        <div class="leather-flap flap-left"></div>
        <div class="leather-flap flap-right"></div>
        <div class="nav-item">基础</div>
        <div class="nav-item">人设</div>
        <div class="nav-center-wrapper">
          <div class="nav-center-btn">
            <div class="icon-diary"
              style="color: #fcf6ec; font-size: 18px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 4px 6px rgba(0,0,0,1); transform: translateY(-2px);">
              日记
            </div>
          </div>
        </div>
        <div class="nav-item active">回忆</div>
        <div class="nav-item">技能</div>
      </div>
    </div>

  </div>

  <script>
    const API = window.location.origin;

    // ---- i18n 多语言 ----
    const I18N = {
      en: {
        appTitle: 'ClawProfile',
        tabs: { base: '📜 Base', persona: '✨ Persona', diary: '📔 Diary', memory: '🧠 Memory', skills: '🪄 Skills' },
        navLabels: { base: 'Base', persona: 'Persona', memory: 'Memory', skills: 'Skills', diary: 'Diary' },
        fileLabels: { 'IDENTITY.md': '📜 Identity', 'USER.md': '👨‍👩‍👧 Family', 'SOUL.md': '✨ Soul', 'AGENTS.md': '⚙️ Rules', 'MEMORY.md': '🧠 Memory', 'TOOLS.md': '🔧 Tools' },
        edit: 'Edit', save: 'Save', cancel: 'Cancel',
        pickerTitle: 'Choose a file to edit',
        noSkills: 'No skills installed',
        backToSkills: '← Back to skills',
        editPrefix: 'Edit',
        loadFail: 'Failed to load'
      },
      zh: {
        appTitle: '龙虾档案',
        tabs: { base: '📜 基础档案', persona: '✨ 人设灵魂', diary: '📔 每日日记', memory: '🧠 回忆录', skills: '🪄 技能工具' },
        navLabels: { base: '基础', persona: '人设', memory: '回忆', skills: '技能', diary: '日记' },
        fileLabels: { 'IDENTITY.md': '📜 我是谁', 'USER.md': '👨‍👩‍👧 我的家庭', 'SOUL.md': '✨ 我的性格', 'AGENTS.md': '⚙️ 我的规则', 'MEMORY.md': '🧠 我记得的事', 'TOOLS.md': '🔧 我用的工具' },
        edit: '编辑', save: '保存', cancel: '取消',
        pickerTitle: '选择要编辑的档案',
        noSkills: '暂无已安装的技能',
        backToSkills: '← 返回技能列表',
        editPrefix: '编辑',
        loadFail: '加载失败'
      },
      'zh-TW': {
        appTitle: '龍蝦檔案',
        tabs: { base: '📜 基礎檔案', persona: '✨ 人設靈魂', diary: '📔 每日日記', memory: '🧠 回憶錄', skills: '🪄 技能工具' },
        navLabels: { base: '基礎', persona: '人設', memory: '回憶', skills: '技能', diary: '日記' },
        fileLabels: { 'IDENTITY.md': '📜 我是誰', 'USER.md': '👨‍👩‍👧 我的家庭', 'SOUL.md': '✨ 我的性格', 'AGENTS.md': '⚙️ 我的規則', 'MEMORY.md': '🧠 我記得的事', 'TOOLS.md': '🔧 我用的工具' },
        edit: '編輯', save: '儲存', cancel: '取消',
        pickerTitle: '選擇要編輯的檔案',
        noSkills: '尚無已安裝的技能',
        backToSkills: '← 返回技能列表',
        editPrefix: '編輯',
        loadFail: '載入失敗'
      },
      ja: {
        appTitle: 'ロブスターファイル',
        tabs: { base: '📜 基本情報', persona: '✨ ペルソナ', diary: '📔 日記', memory: '🧠 記憶', skills: '🪄 スキル' },
        navLabels: { base: '基本', persona: '人格', memory: '記憶', skills: 'スキル', diary: '日記' },
        fileLabels: { 'IDENTITY.md': '📜 アイデンティティ', 'USER.md': '👨‍👩‍👧 ファミリー', 'SOUL.md': '✨ ソウル', 'AGENTS.md': '⚙️ ルール', 'MEMORY.md': '🧠 メモリー', 'TOOLS.md': '🔧 ツール' },
        edit: '編集', save: '保存', cancel: 'キャンセル',
        pickerTitle: '編集するファイルを選択',
        noSkills: 'インストール済みスキルなし',
        backToSkills: '← スキル一覧に戻る',
        editPrefix: '編集',
        loadFail: '読み込み失敗'
      }
    };

    function detectLang() {
      const lang = (navigator.language || 'en').toLowerCase();
      if (lang.startsWith('zh-tw') || lang.startsWith('zh-hant')) return 'zh-TW';
      if (lang.startsWith('zh')) return 'zh';
      if (lang.startsWith('ja')) return 'ja';
      return 'en';
    }

    const LANG = detectLang();
    const t = I18N[LANG];

    // 设置页面标题
    document.title = t.appTitle;

    const TAB_CONFIG = {
      base:    { title: t.tabs.base, type: 'files' },
      persona: { title: t.tabs.persona, type: 'files' },
      diary:   { title: t.tabs.diary, type: 'diary' },
      memory:  { title: t.tabs.memory, type: 'files' },
      skills:  { title: t.tabs.skills, type: 'skills' }
    };

    const FILE_LABELS = t.fileLabels;

    let currentTab = 'base';
    let currentFiles = [];
    let isEditMode = false;
    let editingFileIndex = -1;
    let skillsList = [];
    let viewingSkillId = null;

    const displayEl = document.getElementById('md-display');
    const editorEl = document.getElementById('md-editor');
    const toggleBtn = document.getElementById('toggle-edit-btn');
    const titleEl = document.querySelector('.nav-title');
    const navItems = document.querySelectorAll('.nav-item');
    const diaryBtn = document.querySelector('.icon-diary');
    const pickerOverlay = document.getElementById('file-picker');
    const pickerList = document.getElementById('file-picker-list');
    const pickerCancel = document.getElementById('file-picker-cancel');

    // 应用多语言到 DOM
    titleEl.textContent = t.appTitle;
    const sideNavLabels = [t.navLabels.base, t.navLabels.persona, t.navLabels.memory, t.navLabels.skills];
    navItems.forEach((el, i) => { el.textContent = sideNavLabels[i]; });
    diaryBtn.textContent = t.navLabels.diary;
    pickerCancel.textContent = t.cancel;
    document.querySelector('.file-picker-title').textContent = t.pickerTitle;

    const EDIT_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
    const SAVE_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    // ---- 滚动条显示/隐藏 ----
    let scrollTimer = null;
    function setupScrollFade(el) {
      el.addEventListener('scroll', () => {
        el.classList.add('scrolling');
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => el.classList.remove('scrolling'), 200);
      });
    }
    setupScrollFade(displayEl);
    setupScrollFade(editorEl);

    // ---- API ----
    async function fetchFiles(tab) {
      const res = await fetch(`${API}/api/files?tab=${tab}`);
      return res.json();
    }
    async function fetchDiaries() {
      const res = await fetch(`${API}/api/diaries`);
      return res.json();
    }
    async function saveFile(filename, content, isDiary) {
      const url = isDiary ? `${API}/api/save-diary` : `${API}/api/save`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, content })
      });
      return res.json();
    }
    async function fetchSkills() {
      const res = await fetch(`${API}/api/skills`);
      return res.json();
    }
    async function fetchSkillDetail(id) {
      const res = await fetch(`${API}/api/skills/${encodeURIComponent(id)}`);
      return res.json();
    }

    // ---- 渲染 ----
    function renderView() {
      const combined = currentFiles.map(f => f.content).join('\n\n---\n\n');
      displayEl.innerHTML = marked.parse(combined);
      displayEl.style.display = 'block';
      editorEl.style.display = 'none';
    }

    function renderSkillsList(skills) {
      let html = '<div class="skills-list">';
      if (skills.length === 0) {
        html += `<p style="color:#8c7355;text-align:center;padding:20px 0;">${t.noSkills}</p>`;
      }
      skills.forEach(s => {
        html += `
          <div class="skill-card" data-skill-id="${s.id}">
            <div class="skill-card-header">
              <span class="skill-card-name">${s.name || s.id}</span>
              ${s.category ? `<span class="skill-card-category">${s.category}</span>` : ''}
            </div>
            ${s.tagline ? `<div class="skill-card-tagline">${s.tagline}</div>` : ''}
          </div>`;
      });
      html += '</div>';
      displayEl.innerHTML = html;
      displayEl.style.display = 'block';
      editorEl.style.display = 'none';
      displayEl.querySelectorAll('.skill-card').forEach(card => {
        card.addEventListener('click', () => openSkillDetail(card.dataset.skillId));
      });
    }

    async function openSkillDetail(id) {
      viewingSkillId = id;
      const skill = skillsList.find(s => s.id === id);
      titleEl.textContent = '🪄 ' + (skill ? skill.name : id);
      toggleBtn.style.display = 'none';
      try {
        const data = await fetchSkillDetail(id);
        let html = `<div class="skill-back-btn" id="skill-back">${t.backToSkills}</div>`;
        html += marked.parse(data.content);
        displayEl.innerHTML = html;
        document.getElementById('skill-back').addEventListener('click', backToSkillsList);
      } catch (e) {
        displayEl.innerHTML = `<div class="skill-back-btn" id="skill-back">${t.backToSkills}</div><p>${t.loadFail}</p>`;
        document.getElementById('skill-back').addEventListener('click', backToSkillsList);
      }
    }

    function backToSkillsList() {
      viewingSkillId = null;
      titleEl.textContent = TAB_CONFIG.skills.title;
      toggleBtn.style.display = 'none';
      renderSkillsList(skillsList);
    }

    function enterEditMode(fileIndex) {
      editingFileIndex = fileIndex;
      isEditMode = true;
      editorEl.value = currentFiles[fileIndex].content;
      editorEl.style.display = 'block';
      displayEl.style.display = 'none';
      const label = FILE_LABELS[currentFiles[fileIndex].filename] || currentFiles[fileIndex].filename;
      toggleBtn.innerHTML = SAVE_ICON + ' ' + t.save;
      toggleBtn.style.color = '#a8e6cf';
      titleEl.textContent = t.editPrefix + ' · ' + label;
    }

    function exitEditMode() {
      isEditMode = false;
      editingFileIndex = -1;
      renderView();
      toggleBtn.innerHTML = EDIT_ICON + ' ' + t.edit;
      toggleBtn.style.color = '#dfcd97';
      titleEl.textContent = TAB_CONFIG[currentTab].title;
    }

    // ---- 文件选择面板 ----
    function showFilePicker() {
      pickerList.innerHTML = '';
      currentFiles.forEach((f, i) => {
        const btn = document.createElement('button');
        btn.className = 'file-picker-btn';
        btn.textContent = FILE_LABELS[f.filename] || f.filename;
        btn.addEventListener('click', () => {
          hideFilePicker();
          enterEditMode(i);
        });
        pickerList.appendChild(btn);
      });
      pickerOverlay.classList.add('show');
    }
    function hideFilePicker() {
      pickerOverlay.classList.remove('show');
    }
    pickerCancel.addEventListener('click', hideFilePicker);
    pickerOverlay.addEventListener('click', (e) => {
      if (e.target === pickerOverlay) hideFilePicker();
    });

    // ---- Tab 切换 ----
    async function switchTab(tab) {
      if (isEditMode) return;
      currentTab = tab;
      viewingSkillId = null;
      titleEl.textContent = TAB_CONFIG[tab].title;
      toggleBtn.style.display = 'flex';

      const sideTabOrder = ['base', 'persona', 'memory', 'skills'];
      navItems.forEach((el, i) => {
        el.classList.toggle('active', sideTabOrder[i] === tab);
      });
      const centerBtn = document.querySelector('.nav-center-btn');
      centerBtn.classList.toggle('active-center', tab === 'diary');

      if (tab === 'skills') {
        toggleBtn.style.display = 'none';
      } else {
        toggleBtn.innerHTML = EDIT_ICON + ' ' + t.edit;
        toggleBtn.style.color = '#dfcd97';
      }

      try {
        if (tab === 'skills') {
          skillsList = await fetchSkills();
          currentFiles = await fetchFiles('skills');
          renderSkillsList(skillsList);
          return;
        }
        if (TAB_CONFIG[tab].type === 'diary') {
          currentFiles = await fetchDiaries();
        } else {
          currentFiles = await fetchFiles(tab);
        }
      } catch (e) {
        currentFiles = [{ filename: 'error', content: `_${t.loadFail}: ${e.message}_` }];
      }
      renderView();
    }

    // ---- 编辑/保存按钮 ----
    toggleBtn.addEventListener('click', async () => {
      if (!isEditMode) {
        if (currentFiles.length > 1) {
          showFilePicker();
        } else if (currentFiles.length === 1) {
          enterEditMode(0);
        }
      } else {
        const file = currentFiles[editingFileIndex];
        file.content = editorEl.value;
        const isDiary = TAB_CONFIG[currentTab].type === 'diary';
        await saveFile(file.filename, file.content, isDiary);
        exitEditMode();
      }
    });

    // ---- 导航绑定 ----
    const sideTabOrder = ['base', 'persona', 'memory', 'skills'];
    navItems.forEach((el, i) => {
      el.addEventListener('click', () => switchTab(sideTabOrder[i]));
    });
    diaryBtn.addEventListener('click', () => switchTab('diary'));

    // ---- 初始加载 ----
    switchTab('base');
  </script>
</body>

</html>
