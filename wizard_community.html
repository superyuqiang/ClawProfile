<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ClawProfile</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-top: #4a342b;
      --bg-bottom: #1f1410;
      --gold-light: #f7e6a1;
      --gold-dark: #c59b4c;
      --text-gray: #a89d91;
      --paper-color: #f6eedb;
      --paper-shadow: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Serif SC", serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 430px;
      /* Max mobile width */
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #372118 0%, #170d0a 100%);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      animation: igniteScreen 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes igniteScreen {
      0% { opacity: 0; filter: contrast(1.5) brightness(0.2) saturate(0); }
      40% { opacity: 1; filter: contrast(1.2) brightness(1.2) saturate(1.2); }
      100% { opacity: 1; filter: contrast(1) brightness(1) saturate(1); }
    }

    /* Wood Texture Overlay for Header */
    .app-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      /* Subtle wood grain texture trick using gradients */
      background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 0, 0, 0.05) 1px, rgba(0, 0, 0, 0.05) 2px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    /* Nav Header */
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 8px 16px;
      z-index: 10;
      position: relative;
    }

    /* Back Arrow */
    .back-btn {
      width: 30px;
      height: 24px;
      position: relative;
      display: flex;
      align-items: center;
    }

    .back-btn svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0px 0px 4px rgba(255, 215, 0, 0.4));
    }

    /* Title */
    .title-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 3px;
      font-family: "Georgia", "Times New Roman", serif;
      background: linear-gradient(to bottom, #fdfbfb 0%, #ebce9b 30%, #a47638 50%, #f6e2af 70%, #8b6028 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.8));
      text-transform: uppercase;
    }

    /* Right Tools */
    .header-tools {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 4px 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      gap: 8px;
    }

    .dot-menu,
    .target-menu {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dot-menu {
      width: 16px;
      height: 16px;
      position: relative;
    }

    .dot-menu::before,
    .dot-menu::after {
      content: '';
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
    }

    .dot-menu::before {
      left: 4px;
    }

    .dot-menu::after {
      right: 4px;
    }

    .target-menu {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      position: relative;
    }

    .target-menu::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Search Bar */
    .search-wrapper {
      padding: 5px 20px 15px 20px;
      z-index: 10;
      position: relative;
    }

    .search-bar {
      background: rgba(10, 5, 2, 0.6);
      border-radius: 16px;
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .search-icon {
      width: 14px;
      height: 14px;
      border: 1.5px solid #a89d91;
      border-radius: 50%;
      position: relative;
    }

    .search-icon::after {
      content: '';
      position: absolute;
      width: 1.5px;
      height: 6px;
      background: #a89d91;
      right: -3px;
      bottom: -4px;
      transform: rotate(-45deg);
    }

    .search-input {
      background: transparent;
      border: none;
      color: #e2d1bc;
      font-size: 13px;
      margin-left: 10px;
      width: 100%;
      outline: none;
      letter-spacing: 0.5px;
    }

    .search-input::placeholder {
      color: var(--text-gray);
    }

    /* Main Paper Area */
    .main-content {
      flex: 1;
      position: relative;
      margin: 2px 14px 0px 14px;
      /* Proper mobile horizontal inset */
      display: flex;
      justify-content: center;
      z-index: 5;
    }

    /* Stacked Paper base */
    .paper-stack {
      position: absolute;
      top: 0;
      bottom: 20px;
      /* Tucked deep into the leather pad */
      width: 100%;
      max-width: 420px;
      transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .app-container.is-editing .paper-stack {
      bottom: -10px;
    }

    /* Paper Sheets */
    .sheet {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      border-radius: 1px 1px 0 0;
      /* Subtle white top edge simulating paper thickness */
      border-top: 1px solid rgba(255, 255, 255, 0.8);
    }

    .sheet-3 {
      top: 8px;
      left: -5px;
      right: -1px;
      background: #d8cba9;
      box-shadow: -2px -1px 8px rgba(0, 0, 0, 0.5);
      z-index: 1;
      transform: rotate(-0.6deg);
    }

    .sheet-2 {
      top: 4px;
      left: -1px;
      right: 3px;
      background: #e6dac1;
      box-shadow: -1px -1px 5px rgba(0, 0, 0, 0.4);
      z-index: 2;
      transform: rotate(0.4deg);
    }

    .sheet-front {
      top: 0;
      left: 0px;
      right: 0px;
      background: #fdf8eb;
      /* Perfect parchment base cream */
      z-index: 3;
      /* Drop shadow on other sheets */
      box-shadow:
        -3px -1px 6px rgba(0, 0, 0, 0.25),
        2px 0px 5px rgba(0, 0, 0, 0.15),
        inset 0 0 50px rgba(180, 140, 100, 0.1);
      /* Bright, subtle vignette */

      /* Aging Stains & Divine Candle Lighting & Noise */
      background-image:
        radial-gradient(circle at 80% 30%, rgba(210, 180, 140, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 20% 70%, rgba(210, 180, 140, 0.15) 0%, transparent 50%),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" stitchTiles="stitch"/></filter><rect width="200" height="200" filter="url(%23noise)" opacity="0.05" mix-blend-mode="multiply"/></svg>');
    }

    /* Paper side edge depth/shadows */
    .sheet-front::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 10px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.08) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    .sheet-front::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 6px;
      background: linear-gradient(270deg, rgba(0, 0, 0, 0.05) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Watermark Crest */
    .crest-container {
      position: absolute;
      top: 160px;
      width: 150px;
      height: 120px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.12;
      filter: drop-shadow(0 1px 1px rgba(255, 255, 255, 0.6));
      pointer-events: none;
    }

    .crest-svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #7f7362;
      stroke-width: 1.5;
    }

    /* Bottom Navigation Bar (Leather Pad overlay) */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 10px 0 10px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .app-container.is-editing .bottom-nav {
      transform: translateY(120px);
      pointer-events: none;
    }
    .app-container.is-editing .candles-container {
      display: none;
    }

    /* The Leather Flaps creating the slanted V-edge holding the paper */
    .leather-flap {
      position: absolute;
      width: 55%;
      height: 100px;
      bottom: -20px;
      background-color: #1a0f0a;
      background-image:
        linear-gradient(180deg, rgba(50, 33, 24, 0.8) 0%, rgba(10, 6, 4, 0.95) 100%),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.12" mix-blend-mode="multiply"/></svg>');
      background-blend-mode: normal;
      border-top: 1.5px solid rgba(130, 95, 65, 0.5);
      box-shadow: 0 -6px 15px rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .flap-left {
      left: -5%;
      transform: rotate(4deg);
      transform-origin: bottom left;
    }

    .flap-right {
      right: -5%;
      transform: rotate(-4deg);
      transform-origin: bottom right;
    }

    .nav-item {
      flex: 1;
      text-align: center;
      color: #8a7a6a;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      position: relative;
      padding-bottom: 0;
      cursor: pointer;
      z-index: 10;
    }

    .nav-item.active {
      color: #fff2cc;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 45px;
      height: 16px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse at center, rgba(230, 180, 50, 0.45) 0%, rgba(200, 150, 20, 0.1) 50%, transparent 70%);
      filter: blur(3px);
      z-index: -1;
      pointer-events: none;
    }

    .nav-center-wrapper {
      position: relative;
      width: 90px;
      height: 100%;
      display: flex;
      justify-content: center;
      z-index: 60;
      cursor: pointer;
    }

    .nav-center-btn {
      position: absolute;
      top: -24px;
      width: 66px;
      height: 66px;
      border-radius: 46% 54% 50% 50% / 52% 50% 50% 48%;
      background: radial-gradient(circle at 35% 35%, #b22222 0%, #8b0000 40%, #5c0000 80%, #2f0000 100%);
      box-shadow:
        0 6px 15px rgba(0, 0, 0, 0.7),
        inset 3px 6px 8px rgba(255, 255, 255, 0.25),
        inset -3px -6px 12px rgba(0, 0, 0, 0.6),
        2px -1px 0 1px #800000,
        -1px 2px 0 1px #3a0000;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 70;
      border: none;
      transition: filter 0.2s;
    }

    .nav-center-btn::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 48% 52% 49% 51% / 50% 49% 51% 50%;
      background: radial-gradient(circle at center, #3d0000 0%, #680000 100%);
      box-shadow:
        inset 0 4px 6px rgba(0, 0, 0, 0.8),
        0 1px 1px rgba(255, 255, 255, 0.2);
      pointer-events: none;
    }

    .nav-center-btn::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 52% 48% 53% 47% / 48% 53% 47% 52%;
      background: transparent;
      box-shadow:
        5px 5px 0 -2px rgba(100, 0, 0, 0.5),
        -4px -2px 0 -1.5px rgba(139, 0, 0, 0.6);
      pointer-events: none;
      z-index: -1;
    }

    .nav-center-btn.active-center {
      box-shadow:
        0 4px 25px rgba(255, 100, 50, 0.5),
        inset 3px 6px 8px rgba(255, 255, 255, 0.25),
        inset -3px -6px 12px rgba(0, 0, 0, 0.6);
      filter: brightness(1.1);
    }

    .magic-ripple {
      position: absolute;
      top: 50%; left: 50%;
      width: 100%; height: 100%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      box-shadow: 0 0 10px 4px rgba(255, 50, 0, 0.8);
      opacity: 1;
      animation: rippleAnim 0.6s ease-out forwards;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes rippleAnim {
      0% { width: 100%; height: 100%; opacity: 1; border: 2px solid rgba(255, 100, 50, 0.8); }
      100% { width: 250%; height: 250%; opacity: 0; border: 15px solid rgba(255, 0, 0, 0); box-shadow: 0 0 30px 10px rgba(255, 50, 0, 0); }
    }

    .icon-diary {
      position: relative;
      z-index: 2;
      color: #eedc9a;
      /* Gold foil look */
      font-size: 16px;
      font-family: "Georgia", serif;
      font-weight: 900;
      letter-spacing: 2px;
      /* Engraved text effect */
      text-shadow:
        0 -1px 1px rgba(0, 0, 0, 0.8),
        0 1px 1px rgba(255, 255, 255, 0.3);
      transform: translateX(1px);
      /* optical alignment due to letter-spacing */
    }

    /* Paper airplane icon */
    .icon-airplane {
      width: 38px;
      height: 38px;
      position: relative;
      z-index: 2;
    }

    .icon-airplane svg {
      width: 100%;
      height: 100%;
      transform: rotate(-45deg) scale(0.9);
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 1));
    }

    /* Sub Tabs */
    .sub-tabs {
      display: flex;
      padding: 0 25px 15px 35px;
      gap: 50px;
      z-index: 10;
      position: relative;
      align-items: center;
    }

    .tab-btn {
      color: #e2d1bc;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      letter-spacing: 2px;
    }

    .tab-btn.active {
      color: #3b2818;
      font-weight: 800;
    }

    .tab-bg-shadow {
      position: absolute;
      top: -10px;
      bottom: -10px;
      left: -25px;
      right: -25px;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.6));
      z-index: -1;
    }

    .tab-bg {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fef8eb 0%, #ecd1a8 100%);
      clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
      position: relative;
    }

    .tab-bg::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 4px;
      right: 4px;
      bottom: 3px;
      border: 1px dashed #bda376;
      clip-path: polygon(9% 0, 91% 0, 100% 50%, 91% 100%, 9% 100%, 0 50%);
    }

    /* Paper Inner Content */
    .paper-inner-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 25px 0 25px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .paper-inner-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 60% 40%, rgba(255, 230, 150, 0.3) 0%, rgba(255, 200, 100, 0.08) 50%, transparent 90%);
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: overlay;
      animation: candleFlicker 4s ease-in-out infinite alternate;
    }

    @keyframes candleFlicker {
      0% {
        opacity: 0.8;
        transform: scale(1) translate(0px, 0px);
      }

      25% {
        opacity: 1;
        transform: scale(1.05) translate(-2px, 3px);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.02) translate(1px, -1px);
      }

      75% {
        opacity: 1;
        transform: scale(1.08) translate(3px, 2px);
      }

      100% {
        opacity: 0.85;
        transform: scale(0.98) translate(-1px, -2px);
      }
    }

    .paper-inner-content::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(0deg, rgba(30, 15, 5, 0.7) 0%, rgba(60, 30, 15, 0.2) 50%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* Markdown Text Styles */
    .markdown-body {
      color: #3e2723;
      /* Deep dark brown for text */
      font-family: "Georgia", serif;
      line-height: 1.6;
      font-size: 15px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 120px;
      /* Big padding to scroll out from behind leather */
      user-select: text !important;
      -webkit-user-select: text !important;
    }
    .markdown-body *, .markdown-body *::before, .markdown-body *::after {
      user-select: text !important;
      -webkit-user-select: text !important;
    }

    /* Custom scrollbar for parchment — hidden until scrolling */
    .markdown-body::-webkit-scrollbar {
      width: 4px;
    }

    .markdown-body::-webkit-scrollbar-thumb {
      background: transparent;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .markdown-body.scrolling::-webkit-scrollbar-thumb {
      background: rgba(139, 69, 19, 0.3);
    }

    .markdown-body h1 {
      font-size: 20px;
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 2px dashed rgba(139, 69, 19, 0.25);
      padding-bottom: 5px;
      color: #2b1c11;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    .markdown-body p {
      margin-bottom: 12px;
    }

    .markdown-body strong {
      font-weight: 700;
      color: #2b1c11;
    }

    .markdown-body em {
      font-style: italic;
      color: #6d4c41;
      font-family: serif;
    }

    .markdown-body ul {
      padding-left: 20px;
      margin-bottom: 15px;
      list-style-type: none;
      /* Custom magic markers */
    }

    .markdown-body li {
      margin-bottom: 8px;
      position: relative;
    }

    .markdown-body li::before {
      content: '✦';
      position: absolute;
      left: -18px;
      color: #8c7355;
      font-size: 12px;
      line-height: inherit;
    }

    .markdown-body hr {
      border: 0;
      height: 14px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="M10,10 L45,10 M55,10 L90,10" stroke="%238b4513" stroke-width="0.5" opacity="0.6"/><path d="M48,7 L50,11 L52,7 L50,14 Z" fill="%238b4513" opacity="0.8"/></svg>') center/100% 100% no-repeat;
      margin: 25px 0;
      opacity: 0.8;
    }

    .markdown-body > p:first-of-type::first-letter {
      float: left;
      font-size: 3.2em;
      line-height: 0.8;
      padding-right: 6px;
      padding-top: 4px;
      font-family: "Georgia", serif;
      color: #9c6c40;
      text-transform: uppercase;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
    }

    @keyframes realPageFlipOut {
      0% {
        transform: perspective(1200px) rotateY(0deg);
        opacity: 1;
        filter: brightness(1) drop-shadow(0 0 0 transparent);
      }
      100% {
        transform: perspective(1200px) rotateY(-90deg);
        opacity: 0;
        filter: brightness(0.6) drop-shadow(20px 0 20px rgba(0,0,0,0.4));
      }
    }

    .page-flip-clone {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      padding: 30px 25px 0 25px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-origin: 0% 50%;
      pointer-events: none;
      border-radius: inherit;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.15"/></svg>'), linear-gradient(135deg, #f6eedb 0%, #e8d8b7 100%);
      box-shadow: inset 0 0 30px rgba(139, 69, 19, 0.1), 10px 0 20px rgba(0,0,0,0.4);
      animation: realPageFlipOut 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .markdown-body code {
      font-family: inherit;
      background: rgba(139, 69, 19, 0.08);
      /* Faded parchment code block */
      padding: 2px 5px;

    // ---- 渲染 ----
    // ---- 从 markdown 提取 **Key:** Value 字段 ----
    function extractFields(md) {
      const fields = {};
      // 匹配两种格式：
      // 1) - **Key:** Value (单行)
      // 2) - **Key:**\n  Value (多行，缩进)
      const regex = /[-*]\s*\*\*(.+?):\*\*\s*\n?\s*(.+)/g;
      let m;
      while ((m = regex.exec(md)) !== null) {
        const key = m[1].trim();
        let val = m[2].trim();
        // 跳过未填写的占位符
        if (val.startsWith('_(') || val === '') continue;
        fields[key.toLowerCase()] = { key, val };
      }
      return fields;
    }

    // ---- 卡片渲染：基础 tab 专用 ----
    function renderProfileCard(identityMd, userMd) {
      const id = extractFields(identityMd);
      const usr = extractFields(userMd);

      // 至少要提取到 2 个字段才渲染卡片，否则 fallback
      const totalFields = Object.keys(id).length + Object.keys(usr).length;
      if (totalFields < 2) return null;

      let html = '<div class="profile-card">';

      // Emoji
      if (id.emoji) {
        html += `
          <div class="profile-emoji-container">
            <div class="profile-magic-circle"></div>
            <div class="profile-emoji">${id.emoji.val}</div>
          </div>
        `;
      }

      // Name
      if (id.name) {
        html += `<div class="profile-name">${id.name.val}</div>`;
      }

      // Creature as Stamp
      if (id.creature) {
        html += `<div><div class="profile-creature">${id.creature.val}</div></div>`;
      }

      // Vibe
      if (id.vibe) {
        html += `<div class="profile-vibe">"${id.vibe.val}"</div>`;
      }

      // 分隔线 + User 信息
      const userFields = Object.values(usr);
      if (userFields.length > 0) {
        html += `<div class="profile-section-header-wrapper">
                   <div class="profile-divider"></div>
                   <div class="profile-section-title">${t.fileLabels['USER.md'] || 'Family'}</div>
                 </div>`;
        html += '<div class="profile-fields">';
        userFields.forEach(f => {
          html += `<div class="profile-field">
            <span class="profile-field-key">${f.key}</span>
            <span class="profile-field-dots"></span>
            <span class="profile-field-val">${f.val}</span>
          </div>`;
        });
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    // ---- 日记：从文件名提取日期并格式化 ----
    function formatDiaryDate(filename) {
      const match = filename.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (!match) return filename.replace('.md', '');
      const [, y, m, d] = match;
      const date = new Date(y, m - 1, d);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);

      const isToday = date.toDateString() === today.toDateString();
      const isYesterday = date.toDateString() === yesterday.toDateString();

      const weekdays = {
        en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
        zh: ['周日', '周一', '周二', '周三', '周四', '周五', '周六'],
        'zh-TW': ['週日', '週一', '週二', '週三', '週四', '週五', '週六'],
        ja: ['日', '月', '火', '水', '木', '金', '土']
      };
      const todayLabel = { en: 'Today', zh: '今天', 'zh-TW': '今天', ja: '今日' };
      const yesterdayLabel = { en: 'Yesterday', zh: '昨天', 'zh-TW': '昨天', ja: '昨日' };

      const wd = (weekdays[LANG] || weekdays.en)[date.getDay()];
      let label = `${y}-${m}-${d}  ${wd}`;
      if (isToday) label = `${todayLabel[LANG] || 'Today'}  ${m}-${d}`;
      else if (isYesterday) label = `${yesterdayLabel[LANG] || 'Yesterday'}  ${m}-${d}`;
      return label;
    }

    // ---- 日记：提取摘要（跳过标题和空行，取前两行有意义的文字）----
    function extractDiarySummary(content) {
      const lines = content.split('\n');
      const meaningful = [];
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        if (trimmed.startsWith('#')) continue;
        if (trimmed.startsWith('---')) continue;
        meaningful.push(trimmed);
        if (meaningful.length >= 2) break;
      }
      return meaningful.join(' ') || '...';
    }

    // ---- 翻书动画黑魔法快照机制 ----
    async function flipPageSequence(taskFn) {
      if (document.querySelector('.page-flip-clone') || isEditMode) {
        return await taskFn();
      }
      const sheetFront = document.querySelector('.sheet-front');
      const innerContent = document.querySelector('.paper-inner-content');
      if (!sheetFront || !innerContent) return await taskFn();

      const clone = innerContent.cloneNode(true);
      clone.removeAttribute('id');
      clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));

      const mdDisplay = innerContent.querySelector('.markdown-body');
      const clonedMdDisplay = clone.querySelector('.markdown-body');
      if (mdDisplay && clonedMdDisplay) clonedMdDisplay.scrollTop = mdDisplay.scrollTop;

      clone.style.animation = 'none';
      clone.classList.add('page-flip-clone');
      sheetFront.appendChild(clone);

      try {
        await taskFn();
      } finally {
        void clone.offsetWidth; // 触发回流确保样式应用
        clone.style.animation = '';
        setTimeout(() => { if (clone.parentNode) clone.parentNode.removeChild(clone); }, 650);
      }
    }

    async function switchTab(tab, skipAnimation = false) {

        backBtn.onclick = null;

        const sideTabOrder = ['base', 'persona', 'memory', 'skills'];
        navItems.forEach((el, i) => {
          el.classList.toggle('active', sideTabOrder[i] === tab);
        });
        centerBtn.classList.toggle('active-center', tab === 'diary');

        if (tab === 'skills') {
          toggleBtn.style.display = 'none';
        } else {
          toggleBtn.innerHTML = EDIT_ICON;
          toggleBtn.style.color = '#dfcd97';
        }

        try {
          if (tab === 'skills') {
            skillsList = cache._skills || await fetchSkills();
            currentFiles = cache.skills || await fetchFiles('skills');
            renderSkillsList(skillsList);
            return;
          }
          if (TAB_CONFIG[tab].type === 'diary') {
            currentFiles = cache.diary || await fetchDiaries();
          } else {
            currentFiles = cache[tab] || await fetchFiles(tab);
          }
        } catch (e) {
          currentFiles = [{ filename: 'error', content: `_${t.loadFail}: ${e.message}_` }];
        }
        renderView();
      };
      if (skipAnimation) { await task(); } else { await flipPageSequence(task); }
    }

    // ---- 编辑/保存按钮 ----
    toggleBtn.addEventListener('click', async () => {
      if (!isEditMode) {
        // Skill 详情页：编辑 SKILL.md
        if (currentTab === 'skills' && viewingSkillId) {
          isEditMode = true;
          appContainer.classList.add('is-editing');
          editorEl.value = skillDetailContent;
          editorEl.style.display = 'block';
          displayEl.style.display = 'none';
          cancelBtn.innerHTML = CANCEL_ICON;
          cancelBtn.style.display = 'flex';
          backBtn.style.display = 'none';
          toggleBtn.innerHTML = SAVE_ICON;
          toggleBtn.style.color = '#a8e6cf';
          titleEl.textContent = t.editPrefix + ' · SKILL.md';
          return;
        }
        if (currentTab === 'diary' && viewingDiaryIndex >= 0) {
          enterEditMode(viewingDiaryIndex);
          return;
        }
        if (currentFiles.length > 1) {
          showFilePicker();
        } else if (currentFiles.length === 1) {
          enterEditMode(0);
        }
      } else {
        // Skill 详情页保存
        if (currentTab === 'skills' && viewingSkillId) {
          skillDetailContent = editorEl.value;
          await saveSkillDetail(viewingSkillId, skillDetailContent);
          isEditMode = false;
          appContainer.classList.remove('is-editing');
          cancelBtn.style.display = 'none';
          openSkillDetail(viewingSkillId, true);
          return;
        }
        const file = currentFiles[editingFileIndex];
        file.content = editorEl.value;
        const isDiary = TAB_CONFIG[currentTab].type === 'diary';
        await saveFile(file.filename, file.content, isDiary);
        // 保存后清除对应缓存，下次切换会重新加载
        invalidateCache(currentTab);
        exitEditMode();
      }
    });

    // ---- 导航绑定 ----
    const sideTabOrder = ['base', 'persona', 'memory', 'skills'];
    navItems.forEach((el, i) => {
      el.addEventListener('click', () => switchTab(sideTabOrder[i]));
    });
    diaryBtn.addEventListener('click', () => {
      const ripple = document.createElement('div');
      ripple.className = 'magic-ripple';
      centerBtn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
      switchTab('diary');
    });

    // ---- 初始加载：loading 页面 + 预加载所有数据 ----
    const loadingScreen = document.getElementById('loading-screen');
    const loadingText = document.getElementById('loading-text');
    loadingText.textContent = t.loading;

    const minLoadTime = new Promise(r => setTimeout(r, 2000));

    Promise.all([preloadAll().catch(() => {}), minLoadTime])
      .then(async () => {
        await switchTab('base', true);
        loadingScreen.classList.add('fade-out');
        setTimeout(() => loadingScreen.remove(), 500);
      });
  </script>
</body>

</html>
